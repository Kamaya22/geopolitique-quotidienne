name: Build source statistics

on:
  push:
    branches: [main]
    paths:
      - "data/citations/**"
      - "data/registry.csv"
      - "tools/build_stats.py"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate data/registry.csv
        run: python tools/validate_registry.py

      - name: Regenerate data/STATS.md
        run: python tools/build_stats.py

      - name: Commit STATS.md if it changed
        run: |
          if [ -n "$(git status --porcelain data/STATS.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/STATS.md
            git commit -m "Mise à jour automatique de data/STATS.md"
            git push
          else
            echo "STATS.md inchangé, rien à committer."
          fi
